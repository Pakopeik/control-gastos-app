    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .pie-chart {
            width: 100%;
            height: 200px;
            position: relative;
        }
        .pie-slice {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column;">
            <div class="loading-spinner"></div>
            <p style="margin-top: 20px; color: #666;">Cargando aplicación...</p>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('✅ Service Worker registrado'))
                    .catch(err => console.error('❌ Error SW:', err));
            });
        }
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
          apiKey: "AIzaSyAMXq9Lv-DoNtHX6U0kZcdyQ4dCTHL4iT0",
          authDomain: "control-gastos-familiar-1e142.firebaseapp.com",
          databaseURL: "https://control-gastos-familiar-1e142-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "control-gastos-familiar-1e142",
          storageBucket: "control-gastos-familiar-1e142.firebasestorage.app",
          messagingSenderId: "967296096824",
          appId: "1:967296096824:web:55b039b12383873c0da4cd"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        const PieChartSimple = ({ data }) => {
            const total = data.reduce((sum, item) => sum + item.value, 0);
            let currentAngle = 0;
            
            const createSlice = (value, color, index) => {
                const percentage = (value / total) * 100;
                const angle = (value / total) * 360;
                const startAngle = currentAngle;
                currentAngle += angle;
                
                return (
                    <div key={index} style={{
                        position: 'absolute',
                        width: '100%',
                        height: '100%',
                        top: 0,
                        left: 0,
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center'
                    }}>
                        <svg width="200" height="200" viewBox="0 0 200 200">
                            <circle
                                cx="100"
                                cy="100"
                                r="70"
                                fill="none"
                                stroke={color}
                                strokeWidth="40"
                                strokeDasharray={`${(angle / 360) * 439.8} 439.8`}
                                strokeDashoffset={-((startAngle / 360) * 439.8)}
                                transform="rotate(-90 100 100)"
                            />
                        </svg>
                    </div>
                );
            };

            return (
                <div className="pie-chart" style={{ position: 'relative', height: '200px' }}>
                    {data.map((item, index) => createSlice(item.value, item.color, index))}
                    <div style={{
                        position: 'absolute',
                        top: '50%',
                        left: '50%',
                        transform: 'translate(-50%, -50%)',
                        textAlign: 'center',
                        fontSize: '14px',
                        fontWeight: 'bold'
                    }}>
                        Total<br/>€{total.toFixed(0)}
                    </div>
                </div>
            );
        };

        const ExpenseTrackerApp = () => {
            const [currentMonth, setCurrentMonth] = useState(new Date().getMonth());
            const [currentYear, setCurrentYear] = useState(new Date().getFullYear());
            const [activeView, setActiveView] = useState('monthly');
            const [editingItem, setEditingItem] = useState(null);
            const [editValues, setEditValues] = useState({ concepto: '', valor: 0 });
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [isSyncing, setIsSyncing] = useState(false);
            const [lastSync, setLastSync] = useState(null);
            const [isLoading, setIsLoading] = useState(true);

            const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

            const defaultMonthData = {
                ingresos: 2000,
                gastosFixos: [
                    { id: 1, concepto: 'Hipoteca', valor: 800 },
                    { id: 2, concepto: 'Gasolina', valor: 150 },
                    { id: 3, concepto: 'Comunidad 1', valor: 100 },
                    { id: 4, concepto: 'Comunidad 2', valor: 80 },
                    { id: 5, concepto: 'Colegio', valor: 200 },
                    { id: 6, concepto: 'Seguros Casa', valor: 60 },
                    { id: 7, concepto: 'Seguros Coche', valor: 50 },
                    { id: 8, concepto: 'Internet/Teléfono', valor: 45 },
                    { id: 9, concepto: 'Electricidad', valor: 80 },
                    { id: 10, concepto: 'Agua', valor: 35 }
                ],
                gastosVariables: [
                    { id: 1, concepto: 'Cumple Paco', valor: 0 },
                    { id: 2, concepto: 'Cumple Helia', valor: 0 },
                    { id: 3, concepto: 'Cumple Joana', valor: 0 },
                    { id: 4, concepto: 'Cumple Hector', valor: 0 },
                    { id: 5, concepto: 'Supermercado', valor: 300 },
                    { id: 6, concepto: 'Restaurantes', valor: 0 },
                    { id: 7, concepto: 'Ocio/Entretenimiento', valor: 0 },
                    { id: 8, concepto: 'Ropa', valor: 0 },
                    { id: 9, concepto: 'Farmacia/Salud', valor: 0 },
                    { id: 10, concepto: 'Regalos', valor: 0 }
                ],
                ahorros: [
                    { id: 1, concepto: 'Cuota final toyota', valor: 200 },
                    { id: 2, concepto: 'Manto coches', valor: 100 },
                    { id: 3, concepto: 'Plan Pensiones', valor: 150 },
                    { id: 4, concepto: 'Ahorro Emergencia', valor: 100 },
                    { id: 5, concepto: 'Ahorro Vacaciones', valor: 50 }
                ]
            };

            const [monthlyData, setMonthlyData] = useState(() => {
                const initialData = {};
                for (let month = 0; month < 12; month++) {
                    initialData[month] = JSON.parse(JSON.stringify(defaultMonthData));
                }
                return initialData;
            });

            useEffect(() => {
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            useEffect(() => {
                const dataRef = database.ref(`gastos/${currentYear}`);
                
                const handleData = (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        setMonthlyData(data);
                        setLastSync(new Date());
                    } else {
                        const initialData = {};
                        for (let month = 0; month < 12; month++) {
                            initialData[month] = JSON.parse(JSON.stringify(defaultMonthData));
                        }
                        dataRef.set(initialData);
                    }
                    setIsLoading(false);
                    setIsSyncing(false);
                };

                dataRef.on('value', handleData);
                return () => dataRef.off('value', handleData);
            }, [currentYear]);

            const saveToFirebase = (newData) => {
                setIsSyncing(true);
                database.ref(`gastos/${currentYear}`).set(newData)
                    .then(() => {
                        setLastSync(new Date());
                        setIsSyncing(false);
                    })
                    .catch((error) => {
                        console.error('Error:', error);
                        setIsSyncing(false);
                        alert('Error al guardar');
                    });
            };

            const currentData = monthlyData[currentMonth] || defaultMonthData;

            const totalGastosFijos = currentData.gastosFixos.reduce((sum, item) => sum + item.valor, 0);
            const totalGastosVariables = currentData.gastosVariables.reduce((sum, item) => sum + item.valor, 0);
            const totalAhorros = currentData.ahorros.reduce((sum, item) => sum + item.valor, 0);
